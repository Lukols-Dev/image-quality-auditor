# CodeQL Security Scanning
#
# GitHub's native security analysis. Detects:
#   - SQL injection patterns
#   - Path traversal vulnerabilities
#   - Insecure deserialization
#   - Cryptographic weaknesses
#   - Many other Python security issues
#
# Results appear in: Security tab → Code scanning

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, even without code changes (catches newly published CVEs)
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read
  security-events: write # Required to upload findings
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
